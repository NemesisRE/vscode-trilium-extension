name: Bug Report
description: Report a bug or unexpected behavior in the extension.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out all required fields to help us reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Connect to Trilium server
        2. Open note of type '...'
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or screenshots if possible.
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      description: Found in the Extensions panel (e.g. `0.1.7`).
      placeholder: "0.1.7"
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      description: Run `Help > About` to find the version.
      placeholder: "1.116.0"
    validations:
      required: true

  - type: input
    id: trilium-version
    attributes:
      label: Trilium Notes Version
      description: Found under `Options > About` in Trilium.
      placeholder: "0.63.7"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant output from the **Trilium Notes** output channel (`View > Output`, select "Trilium Notes").
      render: text
    validations:
      required: false
